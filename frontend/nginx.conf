server {
    # Listen on port 8080 (Required for Google Cloud Run)
    listen 8080;
    server_name _;

    # Where the React build files are located
    root /usr/share/nginx/html;
    index index.html;

    # THE MAGIC FIX: Route all 404s back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}