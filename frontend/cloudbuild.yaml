steps:
  # 1. Build the Docker image (Inside the frontend folder)
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'frontend'
    args: 
      - 'build'
      - '-t'
      - 'asia-east1-docker.pkg.dev/$PROJECT_ID/website-frontend-repo/xcelgrad-website:$COMMIT_SHA'
      - '.'

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'frontend'
    args: 
      - 'push'
      - 'asia-east1-docker.pkg.dev/$PROJECT_ID/website-frontend-repo/xcelgrad-website:$COMMIT_SHA'

  # 3. Deploy the image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'xcelgrad-website'
      - '--image'
      - 'asia-east1-docker.pkg.dev/$PROJECT_ID/website-frontend-repo/xcelgrad-website:$COMMIT_SHA'
      - '--region'
      - 'asia-east1'
      - '--allow-unauthenticated'

images:
  - 'asia-east1-docker.pkg.dev/$PROJECT_ID/website-frontend-repo/xcelgrad-website:$COMMIT_SHA'

# Prevent the Service Account logging error
options:
  logging: CLOUD_LOGGING_ONLY